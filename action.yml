name: 'PropWatch'
description: 'Detect removed, renamed, and changed test IDs before they break your E2E tests'
author: 'Stephen Radford'
branding:
  icon: 'search'
  color: 'blue'

inputs:
  base-ref:
    description: 'Base ref to compare against'
    required: false
    default: 'origin/main'
  config-path:
    description: 'Path to config file'
    required: false
  reporters:
    description: 'Comma-separated reporters: console, junit, json, github'
    required: false
    default: 'console,junit'
  output-dir:
    description: 'Output directory for reports'
    required: false
    default: './test-reports'
  exit-on-breaking:
    description: 'Fail the workflow step when breaking changes are detected'
    required: false
    default: 'false'
  report-format:
    description: 'Monorepo report format: aggregate, per-package, both'
    required: false
    default: 'both'
  github-token:
    description: 'GitHub token for PR annotations (github reporter only)'
    required: false

outputs:
  has-breaking-changes:
    description: 'Whether breaking changes were detected'
  breaking-count:
    description: 'Number of breaking changes'
  added-count:
    description: 'Number of added IDs'
  report-path:
    description: 'Path to generated reports'

runs:
  using: composite
  steps:
    - name: Run PropWatch
      shell: bash
      env:
        PROPWATCH_BASE_REF: ${{ inputs.base-ref }}
        PROPWATCH_REPORTERS: ${{ inputs.reporters }}
        PROPWATCH_OUTPUT_DIR: ${{ inputs.output-dir }}
        PROPWATCH_EXIT_ON_BREAKING: ${{ inputs.exit-on-breaking }}
        PROPWATCH_REPORT_FORMAT: ${{ inputs.report-format }}
        PROPWATCH_CONFIG_PATH: ${{ inputs.config-path }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: npx propwatch

    - name: Set outputs
      shell: bash
      if: always()
      run: |
        RESULTS="${{ inputs.output-dir }}/propwatch-results.json"
        if [ -f "$RESULTS" ]; then
          echo "has-breaking-changes=$(node -p "require('$RESULTS').hasBreakingChanges")" >> $GITHUB_OUTPUT
          echo "breaking-count=$(node -p "require('$RESULTS').breakingCount")" >> $GITHUB_OUTPUT
          echo "added-count=$(node -p "require('$RESULTS').addedCount")" >> $GITHUB_OUTPUT
          echo "report-path=${{ inputs.output-dir }}" >> $GITHUB_OUTPUT
        fi
